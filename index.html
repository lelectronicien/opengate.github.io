<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/dbb842b327.js" crossorigin="anonymous"></script>
    <title>OPENGATE</title>
</head>

<body>
    <header>
        <nav>
            <img id="logo" src="https://github.com/lelectronicien/opengate.github.io/blob/master/images/logoOpengate.png?raw=true" alt="">
            <div class="sub-nav">
                <a href="">Services</a>
                <a href="">Universities</a>
            </div>
            <a class="signup" href="">Sign Up</a>
        </nav>
    </header>

    <main class="wrapper">
        <h1>Find a good university in Russia for your study</h1>
        <p>Moscow or others cities, it's your choice</p>

        <div class="search-form">
            <i class="fa-solid fa-location-dot"></i>
            <input type="text" placeholder="Mephi Univesity" style="overflow: auto;">
            <button>
                <span class="search"> Search</span>
                <i class="fa-solid fa-magnifying-glass search-logo"></i>
            </button>
        </div>

        <div class="filter-list">
            <h1>Filter</h1>
            <div class="filter">
                <i class="fa-solid fa-microchip"></i>
                <span>Sciences dures</span>
            </div>
             <div class="filter">
               <i class="fa-solid fa-scale-balanced"></i>
                <span>Sc. humaines et sociale</span>
            </div>
             <div class="filter">
                <i class="fa-solid fa-palette"></i>
                <span>Les arts et cultures</span>
            </div>
                <div class="filter">
               <i class="fa-solid fa-hand-holding-medical"></i>
                <span>Medicale</span>
            </div>
        </div>
    </main>
</body>

</html>
